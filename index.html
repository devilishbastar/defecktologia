const ticketTexts = {

1: `**1 билет «Общие закономерности психического развития»**

При изучении структуры дефекта важно опираться на положение Л.С. Выготского о том, что развитие психики аномальных детей подчиняется тем же основным закономерностям, которые обнаруживаются в развитии нормального ребёнка. Так, выделяют общие и специфические закономерности психического развития детей.

**Общие закономерности** — это закономерности, характерные как для нормально развивающихся детей, так и для детей с нарушениями развития:

1. цикличность психического развития — каждый этап даёт качественные новообразования;
2. неравномерность психического развития — периоды ускорения и замедления;
3. пластичность нервной системы — способность нервной системы изменять свою структуру и функции в ответ на внешние и внутренние стимулы, опыт, обучение, повреждения или возрастные изменения;
4. взаимовлияние биологического и социального в процессе развития;
5. формирование в деятельности — ведущие виды деятельности (предметная, игровая) одинаковы.

Наряду с закономерностями, общими для нормального и аномального развития, В.И. Лубовский выделяет **общие для всех типов нарушенного развития:**

1. личностные изменения;
2. нарушение приёма, переработки, сохранения и использования информации;
3. нарушение словесного опосредствования;
4. более длительные сроки формирования представлений и понятий;
5. риск возникновения социально-психологической дезадаптации.`,

2: `**2 билет «Специфические закономерности психического развития»**

**Специфические закономерности** характерны только для детей с тем или иным нарушением. Эти закономерности не противоречат общим закономерностям, но имеют некоторые особенности. Они возникают вследствие первичного дефекта и его влияния на формирование высших психических функций.

Одной из основных закономерностей является **замедленный темп психического развития** — формирование познавательных процессов, речи, памяти и мышления происходит медленнее и требует специальных условий обучения и воспитания.

**Неравномерность развития психических функций**. Одни функции могут быть относительно сохранными, а другие значительно нарушены. Например, при нарушении слуха может страдать речь, но зрительное восприятие развивается лучше.

**Трудности социальной адаптации и общения**, обусловленные ограниченным опытом взаимодействия с окружающими и особенностями развития речи и эмоционально-волевой сферы.

**Взаимосвязь первичных и вторичных нарушений**, описанная Л. С. Выготским. Первичный дефект (например, нарушение слуха или зрения) приводит к возникновению вторичных отклонений: задержке речевого, интеллектуального и личностного развития.

Однако психическое развитие таких детей обладает **компенсаторными возможностями**. Благодаря сохранным анализаторам, специальному обучению и коррекционной помощи возможно частичное или полное преодоление трудностей развития.`,

3: `**3 билет «Классификация вариантов дизонтогенеза по Лебединскому В.В.»**

Дизонтогенез — это нарушение психического развития, возникающее вследствие органических поражений центральной нервной системы, сенсорных дефектов или неблагоприятных социальных условий.

**1. Недоразвитие.** Характеризуется стойким и тотальным отставанием в развитии всех психических функций вследствие раннего органического поражения мозга. (умственная отсталость, нарушаются мышление, речь, память, внимание и познавательная деятельность в целом.)

**2. Задержанное психическое развитие (ЗПР).** Представляет собой замедленный темп формирования психических функций. Отставание носит временный и частично обратимый характер. При своевременной коррекционной помощи ребенок способен приблизиться к возрастной норме развития.

**3. Поврежденное развитие.** Возникает в случаях, когда ребенок первоначально развивался нормально, но затем вследствие травмы, инфекции или другого заболевания произошло повреждение центральной нервной системы. В результате наблюдается распад уже сформированных психических функций.

**4. Дефицитарное развитие.** Связано с тяжелыми нарушениями отдельных анализаторных систем или опорно-двигательного аппарата (дети с нарушениями слуха, зрения, речи, а также с двигательными нарушениями. Первичный дефект приводит к своеобразию формирования психики и личности).

**5. Искаженное развитие.** Характеризуется сложным сочетанием общего недоразвития, задержки и ускоренного развития отдельных психических функций. Наиболее ярким примером является расстройство аутистического спектра, при котором отдельные способности могут развиваться опережающими темпами на фоне выраженных трудностей общения и социальной адаптации.

**6. Дисгармоническое развитие.** Проявляется в нарушении формирования личности и эмоционально-волевой сферы при относительно сохранном интеллекте. К этому типу относят различные психопатии и патологические варианты характера. Основными признаками являются трудности поведения, общения и социальной адаптации.`,

4: `**4 билет «Характеристика искаженного варианта дизонтогенеза»**

Искажённый вариант дизонтогенеза — это тип нарушенного психического развития, при котором отдельные психические функции развиваются неравномерно и своеобразно. Одни стороны развития могут опережать возрастную норму, тогда как другие значительно отстают или формируются качественно иначе.

Наиболее ярким примером искажённого дизонтогенеза является **расстройство аутистического спектра (РАС)**. У таких детей наблюдаются трудности в общении и социальном взаимодействии, недостаточное развитие эмоциональных контактов с окружающими, ограниченность интересов и стереотипные формы поведения. При этом отдельные способности могут быть сохранными или даже развитыми на высоком уровне (например, механическая память, музыкальные или математические способности).

Для искажённого развития характерны нарушения формирования речи, познавательной деятельности, эмоционально-волевой сферы и социальных навыков. Особенностью является не просто задержка развития, а его качественное своеобразие — ребёнок воспринимает окружающий мир и взаимодействует с ним иначе, чем нормально развивающиеся сверстники.

Причинами данного варианта дизонтогенеза могут быть органические поражения центральной нервной системы, генетические факторы, неблагоприятные воздействия на плод во внутриутробном периоде.

**Ключевые патопсихологические механизмы:**

- **Асинхрония развития** (наиболее выражена): сочетание ретардации (задержки) одних функций и акселерации (ускорения) других. Например, раннее развитие речи при грубом отставании в сенсомоторной сфере, сосуществование «взрослой» и автономной речи.
- **Болезненная гиперестезия** (сверхчувствительность): непереносимость обычных сенсорных раздражителей (света, звука, прикосновений), что ведет к дискомфорту и формированию защитного поведения.
- **Страхи** как ведущий механизм: занимают одно из центральных мест, способствуют аутистической защите.
- **Нарушение связи «слово — предмет»**: диффузный характер связей, трудности обобщения, ориентация на перцептивно яркие (внешние), а не функциональные свойства предметов.
- **Искажение игровой деятельности**: предпочтение манипуляций с неигровыми предметами, стереотипность, отсутствие сюжетно-ролевой игры, разрыв между речью и действием.

**Вторичные нарушения:** Аутизм сам по себе во многом является вторичным компенсаторным механизмом, направленным на защиту от травмирующих влияний внешней среды. Отмечается недоразвитие коммуникации, предметного действия, социальных навыков.`,

5: `**5 билет «Характеристика поврежденного варианта дизонтогенеза»**

**Определение и модель:** Типичной моделью является **органическая деменция**.

**Ключевое отличие от недоразвития:** Повреждение возникает в возрасте **после 2-3 лет**, когда многие мозговые системы уже относительно сформированы. Поэтому ведущим является не столько недоразвитие, сколько **повреждение** и **распад** уже сформировавшихся психических функций.

**Этиология:** Перенесенные инфекции, интоксикации, травмы нервной системы, наследственные дегенеративные и обменные заболевания.

**Структура дефекта:**

- **Парциальность (мозаичность)** нарушений, а не тотальность (как при олигофрении). Выражены локальные корковые и подкорковые дефекты (гнозиса, праксиса, речи, памяти).
- **Нарушение критики и целенаправленности:** отсутствие понимания своей несостоятельности, равнодушие к оценке, отсутствие планов на будущее.
- **Выраженные нейродинамические расстройства:** инертность мышления, истощаемость, персеверации («застревание»).
- **Аффективные и личностные изменения:** адинамия, вялость, аспонтанность *или*, наоборот, психомоторная расторможенность, эйфория, дисфория (злобность), агрессия, патология влечений.

**Типы органической деменции у детей (по Г.Е. Сухаревой):**

1. С преобладанием низкого уровня обобщения.
2. С грубыми нейродинамическими расстройствами (замедленность, плохая переключаемость, истощаемость).
3. С недостаточностью побуждений (вялость, апатия, снижение активности мышления) — *наиболее частый*.
4. С нарушением критики и целенаправленности («полевое поведение», эйфория, дурашливость) — *наиболее частый*.

**Дифференциальная диагностика:** от задержки развития деменция отличается грубой разлаженностью деятельности, личностным распадом, некритичностью и неблагоприятным прогнозом. От олигофрении — более поздним возрастом начала, парциальностью дефекта, частым наличием неврологических симптомов (парезы, параличи, судороги).`,

6: `**6 билет «Характеристика дефицитарного варианта дизонтогенеза»**

**Определение:** Связан с первичной недостаточностью отдельных систем: **зрения, слуха, опорно-двигательного аппарата**, а также тяжелыми соматическими заболеваниями (пороки сердца, бронхиальная астма и др.).

**Базовая модель:** Наиболее показательной моделью являются аномалии развития, связанные с поражением сенсорной или моторной сферы.

**Закономерности формирования вторичных нарушений (по Л.С. Выготскому):**

- Степень и характер вторичных отклонений зависят от **времени возникновения дефекта** (ранняя или поздняя потеря слуха/зрения) и **степени его выраженности** (слепота vs. слабовидение; глухота vs. тугоухость).
- Вторичные нарушения образуют сложный иерархический ряд. Например, глухота → недоразвитие речи → задержка общения → задержка мышления.
- Наблюдается **неравномерность развития** (асинхрония). Пример: у слепых детей бедная предметная моторика может сочетаться с относительно сохранной речью.

**Специфика нарушений при разных дефектах:**

- **При патологии слуха:** нарушение развития речи и общения, снижение словесного опосредования, специфические изменения личности (замкнутость).
- **При патологии зрения:** недоразвитие пространственной ориентировки, схемы тела, бедность предметных действий, страх пространства.
- **При недостаточности двигательной сферы (ДЦП):** страдают тонус, ритмичность, точность движений, формирование предметных действий и автоматизмов. Возможны различные формы: спастическая диплегия (болезнь Литтля), гиперкинетическая, гемипаретическая и др.

**Особенности личности:** При неблагоприятных условиях воспитания формируется **патологическое развитие личности дефицитарного типа** с пониженным фоном настроения, астеническими чертами, ипохондричностью, аутизацией, заниженным уровнем притязаний при завышенной самооценке своего здоровья.

**Коррекция:** Основной путь — опора на сохранные анализаторы и сензитивные периоды развития (например, использование слуха и осязания у слепых).`,

7: `**7 билет «Характеристика общего психического недоразвития»**

**Определение и модель:** Типичная модель — **олигофрения** (умственная отсталость). Это стойкое, необратимое недоразвитие всей психики в целом.

**Умственная отсталость (олигофрения)** — это состояние, характеризующееся нарушениями психического развития в интеллектуальной, познавательной, эмоциональной и других сферах психики и приводящее к социальной дезадаптации.

**Этиология:** Генетические факторы (хромосомные аберрации, например, болезнь Дауна; генные мутации), внутриутробные поражения (инфекции, токсикозы), родовая и ранняя постнатальная патология (инфекции, травмы).

**Два основных клинико-психологических закона олигофрении (по Г.Е. Сухаревой):**

1. **Тотальность** недоразвития: страдают все нервно-психические и даже соматические функции (от моторики до высших психических процессов).
2. **Иерархичность** недоразвития: недостаточность мышления (способности к отвлечению и обобщению) выражена **грубее**, чем недостаточность других функций (гнозиса, праксиса, памяти, эмоций). Страдает вербально-логический уровень в первую очередь.

**Особенности познавательной сферы:**

- **Патологическая инертность** нервных процессов: плохая переключаемость.
- **Слово как часть предмета** (жесткая связь слова и конкретного предмета), трудности обобщения (классификация на конкретном уровне, а не понятийном).
- Относительная сохранность практического (наглядно-действенного) мышления по сравнению с вербально-логическим.
- Характерно расхождение между непосредственным и опосредованным запоминанием (опосредование ухудшает результат).

**Аффективная сфера:** Базальные эмоции (страх, радость, гнев) более сохранны, чем высшие, связанные с интеллектом. Эмоции примитивны, но адекватны похвале и порицанию.

**УО по МКБ-10:**

1. легкая (F70) — 50-59 IQ — *дебильность*
   - видимая задержка развития;
   - могут усваивать навыки общения и самообслуживания;
   - отставание развития сенсомоторики минимально;
   - могут освоить программу 5-6 классов;

   - в дальнейшем могут справляться с несложной работой в специализированных условиях.

   - постоянные надзор;
   - нарушение двигательной активности;

8: `**8 билет «Характеристика задержанного психического развития»**

**Определение:** **Замедление темпа** психического развития, а не стойкое недоразвитие. Чаще обнаруживается при поступлении в школу.

**Ключевое отличие от олигофрении:** Принципиальная обратимость и возможность преодоления задержки в условиях правильного обучения. Дети значительно более продуктивны при использовании помощи.

**Четыре основных варианта (по К.С. Лебединской):**

1. **Конституционального происхождения** (гармонический психический инфантилизм): незрелость эмоционально-волевой сферы (игровые интересы преобладают, внушаемость, яркость эмоций) при относительно сохранном интеллекте.

2. **Соматогенного происхождения:** на фоне длительных хронических соматических заболеваний (астения, физическая и психическая слабость) формируется эмоциональная незрелость, робость, неуверенность.

3. **Психогенного происхождения:** обусловлена неблагоприятными условиями воспитания (гипо- или гиперопека, жестокость), что ведет к патологическому развитию личности (психическая неустойчивость, эгоцентризм, невротические черты).

4. **Церебрально-органического генеза** (наиболее значим для клиники и коррекции):
   - Связан с более поздними (постнатальными) органическими повреждениями мозга.
   - В отличие от олигофрении, здесь наблюдается **мозаичность** нарушений. Страдают не столько операции обобщения, сколько **«предпосылки» интеллекта**: внимание, память, работоспособность, темп деятельности, пространственный гнозис.
   - Характерен **органический инфантилизм:** эмоции примитивны, однообразны, отсутствует живость; преобладают либо эйфория с расторможенностью, либо робость и боязливость.
   - Иерархия нарушений обратна олигофрении: первично страдают базальные функции (нейродинамика), а мышление страдает вторично.

**Динамика:** При своевременной коррекции дети постепенно преодолевают задержку общего психического развития, в отличие от необратимого недоразвития при олигофрении. Однако черты эмоциональной незрелости могут сохраняться длительно.`,

9: `**9 билет «Виды нарушений восприятия»**

**Восприятие** — окончательное заключение о сути воспринимаемых предметов и явлений (анализ признаков, выделение основных (смыслообразующих) и второстепенных (случайных) феноменов, сопоставление полученной информации с представлениями, отражающими в памяти прежний жизненный опыт).

Есть два варианта нарушения восприятия:

- обманы восприятия
  - иллюзии
  - галлюцинации
- психосенсорные расстройства (расстройства сенсорного синтеза):
  - дереализация
  - деперсонализация
  - дэжа вю
  - жамэ вю

**1. Иллюзии** — ошибочное восприятие реально существующего объекта.

По анализаторам:
- зрительные
- слуховые
- обонятельные
- тактильные
- вкусовые

Иллюзии бывают:
- физические — обусловленные свойствами среды (преломление ложки в стакане)
- физиологические — обусловленные особенностями функционирования анализатора (ощущение движения после остановки поезда)
- аффектогенные — в связи с аффектом: страх, тревога, ужас и др (в безобидных восклицаниях окружающих мерещатся слова «война», «расстрел» и тд)
- парейдолические — сложные фантастические образы, насильственно возникающие при рассматривание реальных предметов

**2. Галлюцинации** — восприятие без объекта.

По анализаторам:
- зрительные
- слуховые
- обонятельные
- тактильные
- вкусовые
- висцеральные (общего чувства), происходящие из внутренних органов

По условию возникновения:
- гипнагогические — при засыпании
- гипнопомпические — при пробуждении
- функциональные (рефлекторные) — при наличии определённого раздражителя
- психогенные (внушенные) — у внушаемых людей в след за психотравмирующей ситуацией
- Шарля-Бонне — у больных катарактой, нарушением слуха

По степени сложности:
- элементарные: акоазмы, фотопсии
- простые (один анализатор)
- вербальные (речевые): комментирующие, угрожающие, антагонистические, императивные
- сложные (несколько анализаторов), как правило бывают сценоподобными

По проекции: истинные и ложные (псевдогаллюцинации)

**3. Психосенсорные расстройства (расстройства сенсорного синтеза)** — не нарушено узнавание предметов, однако болезненным образом преобразуются отдельные их качества: размер, форма, цвет и тд.

- Цвет: эритропсия, ксантопсия
- Размер: макропсия, микропсия
- Метаморфопсия — искажения форм и поверхностей
- Удвоение, утроение объектов
- Чувство неустойчивости предметов, падение
- Поворот окружающего на 90 или 180 градусов
- Изменение размеров, формы и количества отдельных частей тела (расстройство схемы тела)
- Нарушение восприятия времени

**Дереализация** — чувство, что окружающий мир непонятным образом изменился, стал «нереальным», «чуждым», «искусственным», «специально подстроенным».

**Деперсонализация** — болезненное переживание человеком собственной измененности, утраты самоидентичности, потери собственного Я.

**Дежа вю** — уже виденное.
**Жамэ вю** — никогда не виденное.

**Свойства восприятия:** предметность, целостность, структурность, константность, осмысленность, активность (или избирательность).`,

10: `**10 билет «Виды нарушений ощущений»**

**Ощущение** — отражение отдельных свойств и качеств предмета.

**Делится на:**
- экстероцептивные (наружные рецепторы: глаза, уши и тд)
- интероцептивным (внутренние процессы организма)
- проприоцептивные (положение тела в пространстве)

**Нарушения ощущения:**

1. количественные (измеряется в интенсивности ощущений):
   - гиперестезия — временное снижение порога чувствительности всех анализаторов, воспринимаемое больным как эмоционально неприятное чувство с оттенком раздражения
   - гипестезия — временное снижение чувствительности всех анализаторов, проявляющуюся неприятным чувством измененности, блеклости, серости окружающего мира
   - анестезия — выпадение чувствительности той или иной (тактильной)
   - анальгезия — выпадение болевой чувствительности

2. качественные:
   - парестезия (искажение) — чувство онемения, покалывания и ползанья мурашек (в норме, когда отлежали руку)
   - сенестопатия — неприятные, тягостные ощущения без четкой локализации, которые описываются больным с трудом, с использованием «как бы», «как будто»
   - боль — неприятное или мучительное ощущение, переживание физического или эмоционального страдания
   - зуд — извращенное чувство боли`,

11: `**11 билет «Виды нарушений внимания»**

**Внимание** — сосредоточенность и направленность психической деятельности на определенный объект.

**Виды внимания:**
- активное внимание — намеренная концентрация на объектах, необходимых для деятельности.
- пассивное внимание — обеспечивает получение информации обо всем, что происходит вокруг, и служит для обеспечения безопасности человека.

Нарушения сознания всегда сопровождаются расстройством внимания, особенно активного.

**Патологии внимания:**

1. ослабление внимания (гипопрозексия):
   - Проявляется рассеянностью — неспособностью длительно сосредоточиваться на определенной деятельности.
   - Сознание человека как бы «уплывает» от объекта деятельности, переключаясь на посторонние мысли или погружаясь в дремоту.
   - Данное расстройство характерно для астенических состояний различного происхождения.

2. полная потеря способности направлять и фиксировать внимание (апрозексия):
   - Крайняя степень ослабления внимания, при которой способность к концентрации утрачивается полностью.
   - Возникает при тяжелых формах олигофрении (умственной отсталости) и при расстройствах сознания.

3. патологическая прикованность (вязкость) внимания:
   - Выражается в том, что некоторые (обычно неприятные) факты и переживания заслоняют в сознании человека все остальные события.
   - Пациент постоянно возвращается в разговоре к обсуждению одной и той же темы.
   - Тесно связана с вязкостью мышления.
   - Возникает у больных эпилепсией и другими органическими заболеваниями головного мозга.

4. усиление внимания (гиперпрозексия):
   - Рассматривается как патология только в случае непропорционального усиления пассивного внимания.
   - Состояние проявляется чрезвычайной отвлекаемостью (вплоть до гиперметаморфоза) и откликаемостью на несущественные события.
   - Обычно данный симптом сопровождается сильными эмоциями (тревога, растерянность, воодушевление).
   - Наблюдается при самых различных острых психозах.`,

12: `**12 билет «Виды нарушений памяти»**

**Память** — сохранение следов воспринятого, важнейшая предпосылка работы интеллекта.

Основными **функциями** памяти являются запоминание (регистрация, фиксация), сохранение (ретенция), воспроизведение (репродукция), забывание.

**Процессы памяти:**
- Запоминание — это активный процесс, при котором с исходным материалом производятся какие-то действия.
- Хранение — наличие информации в долговременной памяти.
- Воспроизведение и узнавание.
- Забывание — все то, что происходит, когда материал не удается извлечь из памяти.

**Классификация видов памяти:**
1. по характеру психической активности: двигательная, эмоциональная, образная, словесно-логическая
2. по характеру целей деятельности: непроизвольная, произвольная
3. по продолжительности закрепления и сохранения материала: мгновенная, кратковременная, долговременная, оперативная

**Количественные нарушения (дисмнезии):**
1. гипермнезия — патологическое обострение памяти.
2. гипомнезия — общее ослабление памяти.
3. амнезия — потеря памяти на определенные промежутки времени или события:
   - ограниченная: ретроградная, антероградная, конградная, истерическая (психогенная/кататимное)
   - генерализованная
   - фиксационная амнезия
   - прогрессирующая амнезия

**Качественные нарушения (парамнезии):**
1. псевдореминистенции — замещения провалов в памяти событиями, которые происходили в действительности, но в другое время
2. конфобуляции — замещения утраченных воспоминаний вымышленными, никогда не происходившими событиями
3. криптомнезии — искажение памяти, выражающиеся в том, что в качестве собственных воспоминаний больные рассматривают сведения, полученные от других людей, из книг, увиденные во сне
4. эхомнезии (редуплицирующая парамнезия Пика) — выражается в уверенности в том, что существует несколько абсолютно идентичных событий или объектов`,

13: `**13 билет «Виды нарушений воли»**

**Воля** — способность к активной, сознательной и целенаправленной деятельности, преодолевая при этот как внутренние, так и внешние препятствия.

**Этапы волевого действия**:
1. возникновение влечения и постановка цели (желания)
2. обдумывание и борьба мотивов
3. принятие решения, составление плана действий (намерение)
4. исполнение

**Патология воли:**

1. количественная:
   - гипербулия — общее увеличение/повышение всех базовых влечений, МАНИАКАЛЬНЫЙ СИНДРОМ
   - гипобулия — общее снижение воли и влечений (подавлены все основные потребности), ДЕПРЕССИВНЫЙ СИНДРОМ
   - абулия — резкое снижение или утрата воли, АПАТИКО-АБУЛИЧЕСКИЙ СИНДРОМ

2. качественная:
   - парабулии — извращение волевой деятельности, КАТАТОНИЧЕСКИЙ СИНДРОМ

**Влечение** — инстинктивная форма деятельности:

1. пищевой инстинкт:
   - ↑ булимия — патологическое желание постоянно и часто много есть
   - ↓ анорексия — отсутствие аппетита, подавление желания есть
   - извращения аппетита (парорексия)

2. половой инстинкт:
   - ↑ гиперсексуальность (М: сатириазис, Ж: нимфомания)
   - ↓ гипосексуальность
   - извращение сексуального влечения (парафилии, перверзии)

3. инстинкт самосохранения:
   - ↑ ипохондрия
   - ↓ самоубийство/попытки самоубийства
   - извращения — «селфхрам»

**Виды влечений:**
- Обсессивное влечение: критическое отношение есть, возможность волевого контроля есть
- Компульсивное влечение: критическое отношение есть, возможность контроля почти отсутствует
- Импульсивное влечение: критическое отношение отсутствует, возможность контроля отсутствует, асоциальное поведение всегда`,

14: `**14 билет «Виды нарушений мышления»**

**Мышление** — отражение связей между предметами и явлениями реального мира.

**Патология:**

1. *по темпу:*
   - тахифрения (болезненное ускорение) — МАНИЯ, ТРЕВОГА, ПРИЕМ ПСИХОСТИМУЛЯТОРОВ
   - брадифрения (болезненное замедление) — ДЕПРЕССИЯ, ОГЛУШЕННОСТЬ, ЭПИЛЕПСИЯ, ТРАВМАТИЧЕСКОЕ ПОВРЕЖДЕНИЕ ГМ

2. *по форме:*
   - патологическая обстоятельность (вязкость, лабиринтное мышление)
   - разорванность — без смысла и цели; грамматическая структура речи сохранена
   - бессвязность (инкогерентность) — исчезает не только смысл, но и грамматическая конструкция фраз
   - формальное мышление: резонёрство, аутистическое, символическое, паралагическое («кривая логика»)
   - речевые стереотипии: персеверации, вербигерация, стоячие обороты

3. *по содержанию:*
   - бредовые идеи — ложные суждения и умозаключения, не поддающиеся разубеждению
   - сверхценные идеи — пациент придает какой-либо мысли явно чрезмерное значение
   - навязчивые идеи (обсцессии) — навязчиво возникающие в сознании больного мысли, при наличии критики

**Наплыв мыслей (ментизм)** — непроизвольное, насильственное возникновение нецеленаправленного потока мыслей.
**Перерывы в мышлении (шперрунг)** — обрыв мыслей, потеря нити разговора.`,

15: `**15 билет «Виды нарушений сознания»**

**Сознание** — способность воспринимать себя и внешний мир во всей целостности событий.

**Признаки нарушения сознания:**
- отрешенность от окружающего мира;
- дезориентация (во времени, месте);
- нечеткость мышления вплоть до бессвязности;
- амнезия болезненного периода.

**Патологии сознания:**

1. *помрачения сознания (количественные изменения сознания)*
   - оглушение (обнубиляция, сомнолентность, глубокое оглушение)
   - сопор — значительное повышение порога возбудимости ЦНС
   - кома — бессознательное состояние с полным отсутствием ответных реакций

2. *изменения сознания (качественные расстройства сознания):*
   - делирий — острый психоз, сопровождающийся нарушением ориентировки, истинными галлюцинациями и психомоторным возбуждением
   - онейроид (шизофренический делирий) — острый психоз с помрачнением сознания, полной отрешенностью от окружающей действительности
   - аменция — глубокое помрачение сознания с полной дезориентировкой, бессвязностью мышления
   - сумеречное расстройство — внезапная утрата ясности сознания с полной отрешенностью от окружающего или с его отрывочным, искаженным восприятием`,

16: `**16 билет «Характеристика основных типов психопатий»**

**Психопатия (расстройство личности)** — стойкая, развивающаяся в детстве и наблюдаемая в течение всей жизни патология личности, проявляющаяся ее общей дисгармоничностью и выраженная в такой степени, что приводит к нарушениям межличностных отношений и социальной адаптации во многих сферах существования больных.

**Основные проявления психопатий:**
- расстройства эмоций (вспыльчивость, стойкое снижение настроения, неоправданный оптимизм, подозрительность)
- расстройство воли и влечений (безволие, нетерпеливость, леность, расторможенность влечений)
- асоциальные поступки или нецелесообразное поведение

**Клинические типы психопатий:**

1. Паранойяльная психопатия (параноидное расстройство личности) [F60.0] — стойкая подозрительность, упрямство, злопамятность, сверхценные идеи.

2. Шизоидная психопатия (шизоидное расстройство личности) [F60.1] — замкнутость (интроверсия), эмоциональная холодность, парадоксальность суждений.

3. Неустойчивая психопатия (диссоциальное расстройство личности) [F60.2] — слабость воли, отсутствие усидчивости, безответственность, лживость.

4. Эксплозивная психопатия (возбудимая, эпилептоидная) [F60.30] — крайняя вспыльчивость, агрессивность, дисфории.

5. Истерическая психопатия (истероидное расстройство личности) [F60.4] — демонстративность, театральность, эгоцентризм.

6. Психастения (ананкастное и тревожное расстройство личности) [F60.5, F60.6] — тревожность, мнительность, нерешительность, педантизм.

7. Астеническая психопатия (зависимое расстройство личности) [F60.7] — слабость, быстрая утомляемость, безынициативность.

8. Аффективные психопатии — гипертимные (активность, оптимизм) и гипотимные (пессимизм, пассивность) личности.

9. Смешанная психопатия (мозаичная психопатия) [F61] — сочетание различных черт.`,

17: `**17 билет «Методы изучения психологических особенностей лиц с ОВЗ в специальной психологии»**

5. изучение продуктов деятельности: анализ письменных работ, рисунков, предметов, производимых в процессе трудового обучения

**Дополнительно:**
1. изучение документации и анамнестических данных
2. принцип комплексного изучения

4. принцип детерминированного подхода`,

20: `**20 билет «Особенности познавательной сферы у детей с нарушениями интеллекта»**

21: `**21 билет «Структура дефекта у детей с ЗПР церебрально-органического генеза»**

- Изучение анамнеза этих детей в большинстве случаев показывает **наличие негрубой органической недостаточности нервной системы**, чаще — **резидуального характера**: патологию беременности, недоношенность, асфиксию и травму в родах, постнатальные нейроинфекции.
- Анамнестические данные указывают и частое замедление смены возрастных фаз развития.
- В соматическом состоянии наряду с частыми признаками задержки физического развития нередко наблюдается общая гипотрофия.
- В неврологическом состоянии часто встречаются гидроцефальные, а иногда и гипертензионные стигмы, стертый гемисиндром, нарушения черепно-мозговой иннервации.
- По данным электроэнцефалографии, нарушения электрической активности мозга при задержке психического развития встречаются достаточно часто: от 30%.
- Церебрально-органическая недостаточность прежде всего накладывает типичный отпечаток на структуру самой ЗПР.
- В формировании ЗПР церебрально-органического генеза значительная роль принадлежит и нарушениям познавательной деятельности, обусловленным недостаточностью памяти, внимания, инертностью психических процессов.

- В зависимости от преобладающего эмоционального фона можно выделить два основных вида органического инфантилизма: 1. Неустойчивый; 2. Тормозимый.
- Первичный дефект ЗПР обладает церебрально-органическим генезом и по статистике встречается чаще.`,

22: `**22 билет «Особенности познавательной сферы у детей с ЗПР»**

23: `**23 билет «Особенности эмоционально-волевой сферы у детей с ЗПР»**

**Общая характеристика: эмоциональная незрелость (инфантилизм)**

Центральной характеристикой эмоционально-волевой сферы при ЗПР является **психический инфантилизм** — сохранение черт, свойственных более младшему возрасту. Это проявляется в:
- Преобладании игровой мотивации над учебной и познавательной.
- Неспособности к волевому усилию и произвольной регуляции поведения.
- Незрелости личности в целом.

**Эмоциональная лабильность и неустойчивость**

У детей с ЗПР наблюдается выраженная **эмоциональная лабильность** (неустойчивость), которая проявляется в:
- Быстрой и частой смене настроений.
- Поверхностности и нестойкости эмоций.
- Низкой толерантности к фрустрирующим ситуациям.

**Зависимость от клинического типа ЗПР**

Структура эмоционально-волевых нарушений напрямую зависит от типа ЗПР (классификация К.С. Лебединской):
- Неустойчивый тип (органический инфантилизм): психомоторная расторможенность, эйфорический оттенок настроения, импульсивность.
- Тормозимый тип (органический инфантилизм): пониженный фон настроения, нерешительность, безынициативность, робость, боязливость.

**Личностные особенности и нарушения поведения**

Детям с ЗПР свойственны:
- Частые состояния беспокойства и тревожности.
- Низкая самооценка и неуверенность в себе.
- Неадекватные аффективные реакции на трудности.
- Недостаточная потребность в общении со сверстниками.

**Особенности регуляции деятельности и восприятия:**
- Слабость самоконтроля и целенаправленности.
- Трудности в понимании эмоций.`,

24: `**24 билет «Структура дефекта у слабовидящих детей»**

Слабовидение — стойкое снижение остроты зрения (от 0,05 до 0,4 на лучше видящем глазу с коррекцией), при котором сохранена первичная ориентировка в окружающем, но значительно страдает точность, детальность и скорость зрительного восприятия.

Структура дефекта (первичные и вторичные нарушения):

1. Первичный (биологический) дефект:
   - Снижение остроты зрения, сужение полей зрения, нарушение цветоощущения, светобоязнь, нистагм.
   - Органическое поражение зрительного анализатора на любом уровне.

2. Вторичные нарушения (психологические и функциональные):
   *Сенсорно-перцептивные:*
   - Затруднения в различении мелких деталей, удаленных объектов, оттенков цвета.
   - Сужение сенсорного опыта, неточность зрительных образов.
   *Когнитивные:*
   - Снижение скорости и объема зрительного запоминания.
   - Трудности в формировании целостного образа предмета (фрагментарность восприятия).
   - Недоразвитие пространственных представлений (по Солнцевой).
   *Речевые:*
   - «Формализм речи» (по Литваку).
   *Двигательные:*
   - Неуверенность в передвижении, нарушения координации.
   *Личностные:*
   - Тревожность, снижение познавательной активности, зависимость от взрослого, неуверенность в себе.

У слабовидящих детей сохранно зрительное восприятие как ведущий анализатор, но оно неполноценно. Поэтому вторичные нарушения носят парциальный (частичный) характер и хорошо поддаются коррекции с использованием остаточного зрения.`,

25: `**25 билет «Структура дефекта у слепых детей»**

Слепота — полное отсутствие зрения либо остаточное зрение не выше 0,04 на лучше видящем глазу (или сохранность только светоощущения), что делает зрительное восприятие невозможным или крайне ограниченным.

Структура дефекта (по Л.И. Солнцевой, А.Г. Литваку):

1. Первичный (биологический) дефект:
   - Полная атрофия зрительного нерва, тяжелые поражения сетчатки, отсутствие глазных яблок и др.
   - Отсутствие или минимальная остаточная светоощущение.

2. Вторичные нарушения (более глубокие и системные, чем при слабовидении):
   *Сенсорная сфера:*
   - Замена зрительного восприятия на осязание, слух, обоняние.
   - Трудности дистантного восприятия объектов.
   *Когнитивная сфера:*
   - Замедленное, сукцессивное формирование образов через осязание.
   - Снижение полноты и обобщенности представлений о предметах.
   - Выраженный «формализм речи».
   *Пространственная ориентировка:*
   - Серьезные затруднения в мобильности.
   *Двигательная сфера:*
   - Скованность, боязнь движения, патологические позы и походка.
   *Личностно-эмоциональная сфера:*
   - Риск аутизации, эмоциональная холодность или тревожность.
   - Возможное формирование иждивенческих установок.

Ключевое отличие от слабовидения (по Солнцевой): при слепоте ведущим анализатором становится не зрение, а комплекс: кожно-кинестетическая чувствительность + слух.`,

27: `**27 билет «Особенности познавательной сферы у детей с нарушением зрения»**

Особенности познавательной сферы у детей с нарушениями зрения обусловлены структурой дефекта: первичным сенсорным нарушением (слепота или слабовидение) и вторичными отклонениями в психическом развитии.

**1. Ощущения и восприятие:**
- Сужение сенсорной сферы.
- Синестезия.
- Фрагментарность.
- Замедленность.

**2. Внимание:**
- Слуховое внимание острое, объем выше нормы.
- Переключение и устойчивость затруднены.

**3. Память:**
- Слуховая память развита выше среднего.
- Образная память беднее.
- Вербализм.
- Тормозимые следы.

**4. Мышление:**
- Замедленное формирование понятий.
- Трудности анализа и синтеза.
- Сохранность логического мышления.

**5. Речь:**
- Формальное речевое развитие (вербализм).
- Компенсаторная роль речи.

**6. Пространственная ориентировка:**
- Трудности в определении направления, расстояния.

**Кратко:**
Обеднение чувственного опыта — ключевая причина вторичных отклонений. Специфические нарушения познавательных процессов: мышление (трудности анализа, синтеза, сравнения), внимание (быстрое утомление), память (высокий объём слуховой, но быстрое забывание образов), восприятие (фрагментарность), речь (формализм). Преодолимость задержек при специальных условиях обучения.`,

28: `**28 билет «Структура дефекта у слабослышащих детей»**

Слабослышащие — дети, имеющие частичную, в разной степени выраженную слуховую недостаточность, которая приводит к нарушениям в речевом развитии.

**Первичный дефект** — частичная слуховая недостаточность.

**Вторичный дефект** — нарушения в речевом развитии:
- недостатки произношения
- бедность лексического запаса
- недостаточное усвоение звукового состава слова
- неточное понимание и неправильное употребление слов
- аграмматизмы
- ограниченное понимание как устной речи, так и читаемого текста
- нарушения просодической стороны речи

**Третичный дефект** — особенности развития психических процессов:

| ВПФ | Особенности |
|---|---|
| Память | Образная память развита лучше чем словесная |
| Внимание | Отличается непроизвольностью в младшем школьном возрасте |
| Восприятие и ощущение | Асинхрония |
| Мышление | Увеличение разрыва в развитии наглядно-образного и словесно-логического мышления, стереотипия, трудности в усвоении понятий, проблемы с анализом и синтезом |

Слабослышащие дети нуждаются в интенсивной психолого-педагогической работе.

Особенности эмоционально-волевой сферы: трудности в понимании эмоций других людей, эмоциональная лабильность, повышенная тревожность.

Если слабослышащий ребенок идет в массовую школу, он испытывает затруднения: затрудненное усвоение грамоты, специфические ошибки в диктанте, трудности понимания объяснений учителя, затруднения при пользовании учебником.`,

29: `**29 билет «Структура дефекта у глухих детей»**

Глухие (неслышащие) дети — это дети с тотальным (полным) выпадением слуха или остаточным слухом, который не может быть самостоятельно использован для накопления речевого запаса.

**Первичный дефект** — нарушение слуха.
Среди неслышащих детей различают: а) неслышащих без речи (ранооглохших); б) неслышащих, сохранивших в той или иной мере речь (позднооглохших).

**Вторичный дефект** — нарушение речевого развития.
Глухота вызывает более медленное и протекающее с большим своеобразием развитие речи.
У позднооглохших может появиться тяжелая психическая реакция.
Потеря имеющейся речи характеризуется рядом особенностей.

**Третичный дефект** — особенности развития психических процессов:

| ВПФ | Особенности |
|---|---|
| Внимание | Характерны неустойчивое состояние, утомляемость, трудности переключения |
| Память | Словесная память имеет большое своеобразие, дети хуже запоминают целые предложения и связные тексты |
| Мышление | Долгое время преобладает наглядно-образное мышление, отстают в формировании словесно-логического |
| Восприятие и ощущение | Особую роль приобретают зрительные ощущения, тактильно-вибрационная чувствительность обостряется |
| Движение | Нарушения двигательных функций, сердечно-сосудистой и дыхательной систем, нарушения зрения |

Эмоционально-волевая сфера детей с проблемами слуха отличается бедностью эмоций, слабостью волевых усилий.`,

32: `**32 билет «Характеристика нарушений опорно-двигательного аппарата у детей»**

Детский церебральный паралич (ДЦП) — это нервно-мышечная недостаточность, вызванная поражением головного мозга.

Ведущими в клинической картине детского церебрального паралича являются двигательные нарушения, которые часто сочетаются с психическими и речевыми расстройствами, нарушениями функций других анализаторных систем (зрения, слуха, глубокой чувствительности), судорожными припадками.

| Тяжелая степень ДЦП | ребенок не овладевает навыками ходьбы и манипулятивной деятельностью |
|---|---|
| Средняя степень ДЦП | дети овладевают ходьбой, но передвигаются неуверенно, часто с помощью специальных приспособлений |
| Легкая степень ДЦП | дети ходят самостоятельно, уверенно как в помещении, так и за его пределами |

ДЦП возникает из-за поражения ЦНС в пренатальный, в моменте родов или ранний постнатальный период.

**Виды патологий:**
1. Заболевание нервной системы: полиомиелит
2. Врожденные: вывих бедра, кривошея, косолапость, аномалии позвоночника
3. Приобретенные: травмы мозга и конечностей, туберкулез, опухоли костей, рахит

**Факторы:**
- Пренатальные: заболевания матери, вредные привычки, внутриутробные инфекции
- Перинатальные: асфиксия в родах, родовая травма
- Постнатальные: травмы, инфекции, интоксикации, кислородная недостаточность

**Особенности двигательного развития:**
1. Нарушения мышечного тонуса (спастичность, ригидность, гипотония, дистония)
2. Ограничение или невозможность произвольных движений (парезы и параличи)
3. Наличие насильственных движений (гиперкинезы, тремор, синкинезии)
4. Нарушения равновесия и координации движений (атаксия)

**Формы ДЦП:**
1. Спастическая диплегия — наиболее распространенная (50%)
2. Двойная гемиплегия — тяжелая форма
3. Гемипаретическая форма — поражение одной стороны тела
4. Гиперкинетическая форма — поражение подкорковых структур
5. Атонически-астатическая форма — поражение мозжечка и лобных долей`,

33: `**33 билет «Структура дефекта при ДЦП»**

| Первичный дефект | - Органическое поражение (нарушение мышечного тонуса, парезы и параличи, гиперкинезы, нарушение координации) |
|---|---|
| Вторичный дефект | - Нарушения восприятия (прежде всего зрительного и тактильного) |

| | - нарушения пространственного гнозиса и праксиса |

| | - Нарушение зрительно-моторной координации |

| | - Гиперопека/гипоопека |`,

38: `**38 билет «Структура дефекта у детей с моторной алалией»**

Моторная алалия — это системное недоразвитие экспрессивной речи центрального органического характера, обусловленное несформированностью языковых операций процесса порождения речевых высказываний при относительной сохранности смысловых и сенсомоторных операций.

В симптоматике расстройств преобладающими являются **языковые нарушения**.

Первичное нарушенное звено в структуре дефекта при моторной алалии — *несформированность произвольной речевой деятельности*.

Вторичное нарушенное звено — *нарушение коммуникативной функции речи с частыми проявлениями речевого и поведенческого негативизма*.

При алалии нарушается как фонетико-фонематическая сторона речи, так и лексико-грамматический строй.

**Более подробная структура дефекта:**
1. ***Нарушение овладения знаковой формой языка.***
2. ***Несформированность операций выбора и комбинирования.***
3. ***Нарушаются все аспекты лексико-грамматического структурирования.***
4. ***Несформированность операции порождения и оформления высказывания.***

**Структура неречевых проявлений:**
- **Неврологическая симптоматика:** общая моторная неловкость, апраксия пальцев рук.
- **Психические особенности:** неравномерность развития ВПФ, быстрая утомляемость, снижение внимания и памяти, инертность мышления.
- **Личностные особенности:** речевой негативизм, обидчивость, критичность к своему дефекту.

**Проявления в речи:**
- литеральные парафазии, персеверации, элизии, контаминации, замены по смыслу, плохие глаголы, отсутствие предлогов, аграмматизм.

При моторной алалии главная проблема — **языковая**, а не моторная. Пассивный словарь обычно **больше** активного.`,

39: `**39 билет «Структура дефекта у детей с сенсорной алалией»**

Сенсорная алалия — нарушение понимания речи вследствие нарушения работы речеслухового анализатора, что возникает при преимущественном поражении височной доли доминантного полушария.

**Структура дефекта:**

Первичный дефект — ***нарушение импрессивной стороны речи*** (восприятие и понимание речи) при полноценном физическом слухе. Это приводит к *недостаточному анализу и синтезу звуковых раздражителей*, как следствие *не формируется связь между звуковым образом и обозначаемым им предметом*. Ребенок слышит, но не понимает обращенную речь.

Вторичные и третичные нарушения:
- Акустическая агнозия.
- Вторичное недоразвитие собственной экспрессивной речи.
- Речевой негативизм и нарушение коммуникативного поведения.
- Нарушения внимания (истощаемость, трудности включения и распределения).
- Трудности пространственной ориентировки и праксиса.
- Недостаточность мнестических процессов и формирования понятийного мышления.

**Неречевая симптоматика:**
- Дети пользуются часто жестами и мимикой.
- Наблюдаются нарушения слухового восприятия и внимания.
- Иногда не понимают инструкции вне конкретной ситуации.
- Двигательные беспокойства и трудности в поведении.`,

40: `**40 билет «Структура дефекта у детей с дизартрией»**

Дизартрия — нарушение произносительной стороны речи, обусловленное недостаточностью иннервации речевого аппарата.

Органическое поражение ЦНС.

**Первичный дефект:** Расстройство произносительной стороны речи, обусловленное недостаточностью иннервации речевого аппарата.

**Вторичный дефект:**
- Речь: недоразвитие лексико-грамматического строя, трудности построения связного высказывания, нарушения чтения и письма.
- Внимание: неустойчивость, трудности концентрации, повышенная отвлекаемость.
- Память: снижение объема запоминания, трудности удержания и воспроизведения информации.
- Мышление: замедленное формирование словесно-логического мышления, трудности анализа, синтеза, обобщения.
- Восприятие: нарушения фонематического восприятия, оптико-пространственного гнозиса.
- Эмоционально-волевая сфера: раздражительность, эмоциональная лабильность, истощаемость, неуверенность в себе.`,

41: `**41 билет «Особенности познавательной сферы у детей с нарушениями речи»**

**Восприятие**
- Всех детей с нарушениями речи отличает отсутствие фонематического слуха.
- Зрительное восприятие отстает от нормы.
- Задержка формирования пространственных представлений.
- Трудности экспрессивной речи.

**Внимание**
Внимание характеризуется: неустойчивостью, низкой произвольностью, трудностью регуляции.

**Память**
- Характерны трудности в узнавании сложных образов.
- Уровень развития словесной памяти всегда хуже нормы.
- Не замечает ошибок воспроизведения.
- Забывают речевую инструкцию.

**Мышление и воображение**
Развитие невербального интеллекта заметно отличается от нормы.
На развитие мышления влияют:
- недостатки знаний
- неподвижность и необратимость мыслительных операций
- недостатки самоорганизации мыслительной деятельности

Недостатки развития речи затрудняют переход от наглядно-практического к образному мышлению.

**Речь**
Запаздывает формирование внутренней речи.
Уровень развития воображения ниже, чем у здоровых сверстников.
Всех детей-логопатов отличает:
- снижение речевой интенции
- снижение потребности в вербальном общении
- низкое развитие средств коммуникации
- негативизм
- замкнутость, стеснительность`,

42: `**42 билет «Особенности развития эмоционально-волевой сферы у детей с нарушениями речи»**

- **Саморегуляция:** слабо развиты самоконтроль, самоанализ и саморегуляция.
- **Личностные черты:** пассивность, зависимость от окружающих, склонность к спонтанному поведению, сензитивность.
- **Эмоциональные свойства:** преобладает эксцентричность (интерес к внешнему миру), но возможна и концентричность (замкнутость).
- **Работоспособность:** низкая, связана со стрессами и негативными эмоциями.
- **Самооценка:** часто неадекватная (завышенная или заниженная).
- **Уровень притязаний:** формируется как защитная реакция.
- Эмоциональная незрелость.
- Трудности произвольного поведения.
- Нарушение коммуникативной функции.
- Повышенная обидчивость, ранимость.
- Тревожность.
- Агрессивное поведение.
- **Фиксация на дефекте** (по В.И. Селиверстову): нулевая, умеренная, выраженная.

У детей с ринолалией — застенчивость, нерешительность, замкнутость. У детей с дизартрией — повышенная эмоциональная возбудимость и истощаемость.`,

43: `**43 билет «Изучение внимания у детей с ОВЗ»**

**1. Что такое внимание и зачем его изучать**

Внимание — это не одна способность, а несколько: удерживать задачу, переключаться, не отвлекаться, распределять силы, контролировать себя. У детей с ОВЗ внимание часто страдает вместе с речью, памятью, моторикой или быстрой утомляемостью.

**2. Какие свойства внимания проверяем**
- Объём
- Устойчивость
- Концентрация
- Переключение
- Распределение
- Произвольность

**3. Кто такие дети с ОВЗ**
Это дети, у которых есть физические или психические недостатки, подтверждённые ПМПК.

**4. Цель и задачи изучения внимания у детей с ОВЗ**
Цель — определить, какие именно трудности мешают ребенку учиться, общаться и выполнять задания.

**5. Принципы обследования (главные правила)**
- Комплексно
- Учитываем причину
- Доступно
- Динамично
- Этично

**6. Что делаем на обследовании (этапы)**
1. Сбор сведений
2. Наблюдение
3. Беседа с ребенком и взрослыми
4. Проведение диагностических заданий
5. Анализ результатов
6. Формулирование рекомендаций

**7. Какие методики чаще всего используем**
- Корректурная проба
- Таблицы Шульте
- Пьерон-Рузер
- «Найди отличия», лабиринты
- Опросники для родителей и учителей
- Анализ тетрадей

**8. Особенности внимания при разных ОВЗ**
Таблица с группами: ЗПР, нарушения интеллекта, ТНР, нарушения слуха, зрения, ОДА, РАС, СДВГ.

**9. Как правильно анализировать результаты**
Отвечаем на вопросы: понял ли инструкцию? ошибки с начала или нарастают? что помогает? может ли сам исправить?

**10. Что делаем по результатам (рекомендации)**
Сокращать инструкцию, использовать визуальные опоры, чередовать виды деятельности, делать паузы, учить самопроверке.

**11. Типичные ошибки специалиста**
Не ставить диагноз по одной методике, не сравнивать с нормой, не путать непонимание инструкции с невнимательностью.`,

44: `**44 билет «Изучение особенностей восприятия у детей с ОВЗ»**

**1. Главное понятие**
Восприятие — это психический процесс, с помощью которого ребёнок узнаёт предметы и явления как целостные образы.

**2. Что именно изучают**
- Зрительное восприятие
- Слуховое восприятие
- Пространственное восприятие
- Тактильное восприятие
- Восприятие собственного тела и движения
- Темп и точность восприятия

**3. Почему это важно для обучения**
Нарушения восприятия напрямую влияют на обучение: чтение, письмо, понимание речи, ориентировку.

**4. Принципы обследования детей с ОВЗ**
Учитывают диагноз, возраст, уровень речи, зрения, слуха, моторики. Задания дают короткими инструкциями. Результат оценивают по способу выполнения.

**5. Основные методы изучения восприятия**
1. Наблюдение
2. Беседа с родителями и педагогами
3. Предметные и картинные задания
4. Задания на зрительный анализ
5. Задания на пространственную ориентировку
6. Задания на слуховое восприятие
7. Тактильные задания

**6. Типичные особенности восприятия при разных вариантах ОВЗ**
При ЗПР — замедленное, недостаточно точное. При УО — конкретное, фрагментарное. При РАС — необычные сенсорные реакции. При нарушениях зрения — страдает зрительное узнавание. При нарушениях слуха — затрудняется восприятие речи. При ТНР — трудности понимания инструкций. При ОДА — ошибки могут быть связаны с моторикой.

**7. Как правильно интерпретировать результаты**
Важно ответить на три вопроса: что нарушено, почему, как влияет на обучение.

**8. Рекомендации по помощи ребёнку**
Использовать наглядные материалы, короткие инструкции, снижать раздражители, развивать восприятие через игры.`,

45: `**45 билет «Изучение особенностей памяти у детей с ОВЗ»**

**1. Понятие памяти**
Память — фиксация, сохранение и воспроизведение опыта. Виды: по времени (кратковременная, долговременная), по анализатору (зрительная, слуховая), по воле (произвольная, непроизвольная).

**2. Основные типы нарушений (нейропсихология)**
- Модально-неспецифические (поражение энергетического блока мозга)
- Модально-специфические (поражение анализаторных зон)

**3. Психопатология памяти**
Количественные нарушения: гипомнезия, гипермнезия, амнезии.
Качественные (парамнезии): конфабуляции, криптомнезии, псевдореминисценции, déjà vu.

**4. Специфика при разных категориях ОВЗ**
- При УО: страдает логическая память, плохо используют опосредованное запоминание
- При ЗПР: неравномерная память, низкая избирательность
- При ДЦП: астения (истощаемость), страдает зрительно-пространственная память
- При сенсорных нарушениях: компенсаторный характер (у глухих — отличная зрительная память, у слепых — тактильная и слуховая)

**5. Связь с личностью (по Братусю)**
Дефект памяти ведёт к выученной беспомощности, снижению мотивации, зависимости от внешних напоминаний.

**6. Основные методики исследования**
- Пиктограмма (Лурия)
- Узнавание фигур (Бернштейн)
- Ассоциативная память`,

46: `**46 билет «Особенности мышления у детей с ОВЗ»**

Мышление — высшая форма познания. В онтогенезе последовательно сменяются три вида: наглядно-действенное (2-4 года), конкретно-образное (4-7 лет) и абстрактно-логическое (после 7 лет).

**1. Общие направления нарушений мышления (по Б.В. Зейгарник)**
- Нарушение операциональной стороны мышления
- Нарушение динамики мышления
- Нарушение личностно-мотивационного компонента

**2. Особенности мышления у детей с различными нозологиями**
- Нарушения слуха: замедленное овладение словесной речью, долго преобладает наглядно-образное мышление
- Нарушения зрения: сужены понятия, «вязкость» мышления
- Нарушения речи: трудности словесно-логического мышления
- УО: лабильность, инертность, снижение уровня обобщения
- ЗПР: заторможенность, низкая способность к анализу и синтезу
- ДЦП: позднее формирование наглядно-действенного мышления, инертность

**3. Методики диагностики мышления**
- Методика «Исключение лишнего» (понятийное мышление)
- Метод «Логика связей»`,

47: `**47 билет «Изучение особенностей эмоционально-волевой сферы у детей с ОВЗ»**

**Ключевая идея:** при всех видах ОВЗ наблюдается феномен «нарушенного развития» — сензитивные периоды сдвигаются, а связь между желанием и действием искажается.

**1. Общие закономерности дизонтогенеза ЭВС:**
- Более позднее становление высших эмоций
- Склонность к аффективным вспышкам, импульсивности
- Трудности произвольной регуляции

**2. Специфика в зависимости от категории ОВЗ:**
- При ЗПР: поверхностность эмоций, быстрая смена настроения
- При УО: некритичность, примитивные влечения
- При ДЦП: высокая тревожность, склонность к страхам
- При нарушениях слуха/зрения: обедненность мимики и интонаций, обидчивость

**3. Методы диагностики:**
- Проективные методики: «Рисунок человека», «Дом-дерево-человек», тест Розенцвейга
- Шкалы: наблюдение, методика «Паровозик», Цветовой тест Люшера
- Беседа и метод «незаконченных рассказов`

48: `**48 билет «Структура дефекта у детей с РАС»**

**Ключевая идея:** РАС — не «отгороженность», а нарушение развития системы переработки информации и афферентного синтеза.

**1. Первичный дефект (биологическая основа):**
- *Биологический уровень:* нарушение зеркальных нейронов.
- *Психологический уровень:* искажение переработки сенсорной информации.
- **Главное проявление:** снижение потребности в контакте, нарушение способности к социальной интуиции.

**2. Вторичные дефекты:**
- *Эмоциональные:* сверхценные страхи, агрессия, аутоагрессия.
- *Речевые:* мутизм, эхолалии, штампованная речь.
- *Интеллектуальные:* неравномерность интеллекта.
- *Поведенческие:* стереотипии.

**3. Третичный дефект (социальные последствия):**
- Негативизм педагогов, социальная изоляция семьи, дезадаптация в школе.

**Клинический пример:** Ребенок не идет на контакт (первично). Его не берут в игру — он начинает биться головой (вторичная аутоагрессия). Родители перестают выходить на улицу (третичный эффект).

Чем раньше началась АВА-терапия, тем меньше вторичных наслоений.`,

49: `**49 билет «Эмоциональный интеллект и регуляция поведения»**

**Компоненты эмоционального интеллекта и их нарушения при РАС:**

| Компонент | Характеристика нарушений при РАС | Проявления в поведении |
|---|---|---|
| Идентификация эмоций | Сложности в распознавании собственных эмоций и эмоций других | Ребенок не может объяснить причину дискомфорта |
| Понимание эмоций | Затруднения в установлении причинно-следственных связей | Непонимание шуток, иронии, социальных правил |
| Саморегуляция | Недостаточность контроля над интенсивностью эмоций | Истерики, агрессия, самоагрессия |
| Использование эмоций | Трудности в использовании эмоционального опыта | Слабая способность к сопереживанию |

**Связь эмоционально-волевых нарушений с когнитивной сферой**
Дезорганизация аффективной системы приводит к нарушению активного взаимодействия с миром, что искажает процесс накопления опыта.

**Специфика волевых нарушений в группах аутистического дизонтогенеза:**

| Группа | Основной механизм нарушения воли | Проявление в поведении |
|---|---|---|
| I группа | Глубокое нарушение психического тонуса | Бездеятельность, полевое поведение |
| II группа | Активность направлена на аутостимуляцию | Импульсивность и стереотипность |
| III группа | Высокая, но односторонняя произвольность | Избирательная целеустремленность |
| IV группа | Истощаемость и чувствительность к неудаче | Тормозимость и отказ |`,

50: `**50 билет «Особенности познавательной сферы у детей с РАС»**

Особенности познавательной сферы при РАС носят **неравномерный, диссоциированный** характер. Невербальный интеллект часто выше вербального.

1. **Неустойчивость и избирательность внимания.** Трудности с концентрацией, внимание быстро истощается. Характерна психическая пресыщаемость.

2. **Своеобразие восприятия.** Повышенная сенсорная ранимость. В восприятии нарушена ориентировка в пространстве, искажается целостность картины мира. Ребёнок фокусируется на отдельных частях.

3. **Механическая память.** Хорошая механическая память, запоминание больших объёмов информации без осмысления.

4. **Трудности в символизации и переносе навыков.** Сложно осмысливать символы, метафоры, подтекст. Перенос навыков затруднён.

5. **Неравномерность интеллектуального развития.** Интеллект может соответствовать норме с повышенными способностями в отдельных областях.

6. **Особенности мышления.** Мышление часто носит «визуальный» характер — «думают в картинках».

7. **Стереотипность и однообразие поведения.** Склонность к повторяющимся действиям (стереотипам).

8. **Трудности в пространственной организации и моторная неловкость.**

9. **Проблемы с речью и коммуникацией.** Задержка речевого развития, эхолалии, стереотипное использование речи.`,

52: `**52 билет «Понятие и виды девиантного поведения у детей и подростков»**

**Девиантное поведение** (поведение с отклонениями) [от позднелат. deviatio - отклонение] — это поведение человека, которое не соответствует принятым в обществе нормам и ролевым ожиданиям.

**Девиация** — широкий спектр отклонений поведения личности от традиционных в данном обществе нормативов поведения.

**Девиантность** — это проявление нарушения социальной регуляции поведения, дефектности психической саморегуляции.

**Девиант** — индивид, отличающийся по своим характеристикам от основной массы ему подобных.

**Социальная норма** — это явление группового сознания в виде представлений, которые разделяет группа, и наиболее частых суждений членов группы о требованиях к поведению.

В работах М.А. Галагузовой употребляются термины «дети с девиантным поведением», «дети с деструктивным поведением», а также «дезадаптированные дети».

В соответствии с перечисленными критериями можно выделить следующие группы поведения подростков с отклонениями:

- **аморальное** (асоциальное, внешне деструктивное, маргинальное, пограничное) поведение
- **делинквентное** (антисоциальное, противоправное) поведение
- **саморазрушительное** (диссоциальное, аутодеструктивное) поведение

**Аморальное поведение подростков** — это поведение, которое отклоняется от выполнения морально-этических норм.

**Делинквентное поведение** — это поведение, противоречащее правовым нормам. Для подростков характерны: хулиганство, кражи, грабежи, вандализм, физическое насилие, торговля наркотиками.

**Саморазрушительное поведение** — это поведение, отклоняющееся от медицинских и психологических норм, угрожающее целостности и развитию самой личности. Основные формы:
- суицидальное поведение
- аддиктивное поведение (пищевая зависимость, химическая зависимость, нехимические аддикции)
- выбор одиночества, аскетизма, отшельничества`


}; // конец ticketTexts

// ========== ЛОГИКА ==========
let completed = new Set();
let currentTicket = null;

function renderSidebar() {
  const container = document.getElementById('topicList');
  container.innerHTML = '';

  topics.forEach(topic => {
    const group = document.createElement('div');
    group.className = 'topic-group';

    const label = document.createElement('div');
    label.className = 'topic-label';
    label.textContent = topic.label;
    group.appendChild(label);

    topic.tickets.forEach(t => {
      const item = document.createElement('div');
      item.className = 'ticket-item';
      if (completed.has(t.num)) item.classList.add('completed');

      const numSpan = document.createElement('span');
      numSpan.className = 'num';
      numSpan.textContent = t.num;
      item.appendChild(numSpan);

      const titleSpan = document.createElement('span');
      titleSpan.className = 'title';
      titleSpan.textContent = t.title;
      item.appendChild(titleSpan);

      const check = document.createElement('span');
      check.className = 'check-mark';
      check.textContent = completed.has(t.num) ? '✓' : '○';
      item.appendChild(check);

      item.dataset.num = t.num;
      item.dataset.title = t.title;
      item.dataset.topicLabel = topic.label;

      item.addEventListener('click', function() {
        const num = parseInt(this.dataset.num);
        const title = this.dataset.title;
        const topicLabel = this.dataset.topicLabel;
        showTicket(num, title, topicLabel);
      });

      group.appendChild(item);
    });

    container.appendChild(group);
  });

  updateProgress();
}

function showTicket(num, title, topicLabel) {
  const display = document.getElementById('ticketDisplay');
  document.getElementById('currentTopicLabel').textContent = topicLabel || 'Билет';

  const text = ticketTexts[num] || '*текст билета не найден*';

  let htmlContent = text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');

  htmlContent = htmlContent.replace(/(<br>){2,}/g, '</p><p>');
  htmlContent = '<p>' + htmlContent + '</p>';

  const isLearned = completed.has(num);

  display.innerHTML = `
    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
      <div>
        <h2>Билет ${num}. ${title}</h2>
        <div class="subhead">${topicLabel || ''}</div>
      </div>
    </div>
    <div class="ticket-content">${htmlContent}</div>
    <div class="action-bar">
      <button class="btn-learn ${isLearned ? 'learned' : ''}" id="learnBtn">
        ${isLearned ? '✅ Изучено' : '📘 Отметить как изученное'}
      </button>
      <span class="status-badge">${isLearned ? '✔️ выучено' : '⏳ не изучено'}</span>
    </div>
  `;

  currentTicket = { num, title, topicLabel };

  const btn = document.getElementById('learnBtn');
  if (btn) {
    btn.addEventListener('click', function() {
      toggleCompleted(num);
    });
  }

  document.querySelectorAll('.ticket-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.num) === num);
  });
}

function toggleCompleted(num) {
  if (completed.has(num)) {
    completed.delete(num);
  } else {
    completed.add(num);
  }
  renderSidebar();
  if (currentTicket && currentTicket.num === num) {
    showTicket(currentTicket.num, currentTicket.title, currentTicket.topicLabel);
  }
  updateProgress();
  try {
    localStorage.setItem('ticket_completed', JSON.stringify([...completed]));
  } catch(e) {}
}

function updateProgress() {
  const total = 52;
  const done = completed.size;
  document.getElementById('progressText').textContent = `${done} / ${total} изучено`;
}

// ========== ИНИЦИАЛИЗАЦИЯ ==========
try {
  const saved = localStorage.getItem('ticket_completed');
  if (saved) {
    const arr = JSON.parse(saved);
    arr.forEach(n => completed.add(n));
  }
} catch(e) {}

renderSidebar();

if (topics.length && topics[0].tickets.length) {
  const first = topics[0].tickets[0];
  showTicket(first.num, first.title, topics[0].label);
}

})();
</script>
