    // ---- текст билетов (ключ: номер билета) ----
    // Содержимое взято из файла, разбито по билетам.
    const ticketTexts = {
      1: `**Общие закономерности** — это закономерности, характерные как для нормально развивающихся детей, так и для детей с нарушениями развития:
1. цикличность психического развития — каждый этап даёт качественные новообразования;
2. неравномерность психического развития — периоды ускорения и замедления;
3. пластичность нервной системы — способность изменять структуру и функции в ответ на стимулы;
4. взаимовлияние биологического и социального;
5. формирование в деятельности — ведущие виды деятельности одинаковы.

Наряду с общими, В.И. Лубовский выделяет общие для всех типов нарушенного развития:
- личностные изменения;
- нарушение приёма, переработки, сохранения и использования информации;
- нарушение словесного опосредствования;
- более длительные сроки формирования представлений и понятий;
- риск социально-психологической дезадаптации.`,

      2: `**Специфические закономерности** характерны только для детей с конкретным нарушением. Возникают вследствие первичного дефекта.
- Замедленный темп психического развития.
- Неравномерность развития психических функций.
- Трудности социальной адаптации и общения.
- Взаимосвязь первичных и вторичных нарушений (Л.С. Выготский).
- Компенсаторные возможности благодаря сохранным анализаторам и коррекционной помощи.`,

      3: `**Классификация вариантов дизонтогенеза по В.В. Лебединскому**:
1. Недоразвитие (стойкое тотальное отставание, УО).
2. Задержанное развитие (ЗПР, временный и обратимый характер).
3. Поврежденное развитие (органическая деменция после 2-3 лет).
4. Дефицитарное развитие (нарушения слуха, зрения, ОДА).
5. Искаженное развитие (РАС, асинхрония).
6. Дисгармоническое развитие (психопатии, нарушения личности).`,

      4: `**Искажённый вариант дизонтогенеза** — отдельные функции развиваются неравномерно, одни опережают норму, другие отстают. Наиболее яркий пример — РАС.
Ключевые механизмы:
- Асинхрония (сочетание ретардации и акселерации).
- Болезненная гиперестезия (сверхчувствительность).
- Страхи как ведущий механизм.
- Нарушение связи "слово — предмет".
- Искажение игровой деятельности (стереотипии, отсутствие сюжетно-ролевой игры).
Вторичные нарушения: аутизм как компенсаторный механизм защиты.`,

      5: `**Поврежденный вариант дизонтогенеза** — типичная модель органическая деменция. Отличие от недоразвития: повреждение возникает после 2-3 лет, когда системы уже сформированы → ведущим становится распад функций.
Этиология: инфекции, травмы, наследственные заболевания.
Структура дефекта:
- парциальность (мозаичность) нарушений;
- нарушение критики и целенаправленности;
- нейродинамические расстройства (инертность, истощаемость);
- аффективные и личностные изменения.
Типы (по Сухаревой): с низким уровнем обобщения, с нейродинамическими расстройствами, с недостаточностью побуждений, с нарушением критики.`,

      6: `**Дефицитарный вариант дизонтогенеза** — первичная недостаточность отдельных систем: зрения, слуха, ОДА, тяжелые соматические заболевания.
Закономерности вторичных нарушений (Выготский): зависят от времени возникновения и степени выраженности дефекта.
Специфика:
- при патологии слуха: нарушение речи, общения, замкнутость;
- при патологии зрения: недоразвитие пространственной ориентировки, схемы тела;
- при ДЦП: страдают тонус, точность, автоматизмы.
Личность: при неблагоприятных условиях — патологическое развитие дефицитарного типа. Коррекция: опора на сохранные анализаторы.`,

      7: `**Общее психическое недоразвитие** — типичная модель олигофрения (УО). Стойкое, необратимое недоразвитие всей психики.
Этиология: генетические, внутриутробные, родовые поражения.
Два закона (Сухарева): тотальность и иерархичность (мышление страдает грубее).
Особенности: инертность, слово как часть предмета, трудности обобщения, относительная сохранность наглядно-действенного мышления.
Степени УО по МКБ-10: лёгкая (F70, IQ 50-59), умеренная (F71, 35-49), тяжёлая (F72, 20-34), глубокая (F73, ≤20).`,

      8: `**Задержанное психическое развитие (ЗПР)** — замедление темпа, обратимость. Основные варианты (по Лебединской):
1. Конституционального происхождения (гармонический инфантилизм).
2. Соматогенного происхождения (на фоне хронических болезней).
3. Психогенного происхождения (неблагоприятные условия воспитания).
4. Церебрально-органического генеза (мозаичность нарушений, органический инфантилизм).
Динамика: при своевременной коррекции возможно преодоление задержки.`,

      9: `**Нарушения восприятия**:
Обманы восприятия: иллюзии (ошибочное восприятие реального объекта) и галлюцинации (восприятие без объекта).
Иллюзии: физические, физиологические, аффектогенные, парейдолические.
Галлюцинации: по анализаторам (зрительные, слуховые и др.), по условиям (гипнагогические, функциональные, психогенные), по сложности (элементарные, простые, сложные). Истинные vs ложные (псевдогаллюцинации).
Психосенсорные расстройства: макропсия, микропсия, метаморфопсия, расстройство схемы тела.
Дереализация, деперсонализация, дежа вю, жамэ вю.`,

      10: `**Нарушения ощущений**:
Ощущение — отражение отдельных свойств.
Количественные нарушения: гиперестезия, гипестезия, анестезия, анальгезия.
Качественные: парестезия, сенестопатия, боль, зуд.`,

      11: `**Нарушения внимания**:
- гипопрозексия (ослабление, рассеянность);
- апрозексия (полная потеря способности);
- патологическая прикованность (вязкость);
- гиперпрозексия (усиление пассивного внимания, отвлекаемость, гиперметаморфоз).`,

      12: `**Нарушения памяти**:
Количественные (дисмнезии): гипермнезия, гипомнезия, амнезии (ретроградная, антероградная, фиксационная, прогрессирующая).
Качественные (парамнезии): псевдореминисценции, конфабуляции, криптомнезии, эхомнезии.`,

      13: `**Нарушения воли**:
Количественные: гипербулия, гипобулия, абулия.
Качественные: парабулии (извращение влечений).
Влечения: пищевой (булимия, анорексия, парорексия), половой (гипер-/гипосексуальность, парафилии), самосохранения (ипохондрия, суицид, селфхарм).
Обсессивные, компульсивные и импульсивные влечения.`,

      14: `**Нарушения мышления**:
По темпу: тахифрения (ускорение), брадифрения (замедление).
По форме: патологическая обстоятельность, разорванность, бессвязность, формальное мышление (резонёрство, аутистическое, символическое, паралогическое), речевые стереотипии.
По содержанию: бредовые идеи (преследования, депрессивный, величия), сверхценные идеи, навязчивые идеи (обсессии). Ментизм, шперрунг.`,

      15: `**Нарушения сознания**:
Количественные (помрачения): оглушение (обнубиляция, сомнолентность, глубокое), сопор, кома.
Качественные (изменения): делирий (стадии), онейроид, аменция, сумеречное расстройство.`,

      16: `**Основные типы психопатий** (расстройства личности):
1. Паранойяльная (подозрительность, сверхценные идеи).
2. Шизоидная (замкнутость, холодность).
3. Неустойчивая (слабоволие, асоциальность).
4. Эксплозивная (вспыльчивость, дисфории).
5. Истерическая (демонстративность, эгоцентризм).
6. Психастеническая (тревожность, сомнения).
7. Астеническая (истощаемость, зависимость).
8. Аффективные (гипертимные, гипотимные).
9. Смешанная.`,

      17: `**Методы изучения психологических особенностей лиц с ОВЗ**:
- наблюдение;
- беседа;
- опрос/анкетирование;
- психологический эксперимент;
- изучение продуктов деятельности;
- изучение документации;
- принципы комплексного, системного и детерминированного подхода.`,

      18: `**Структура дефекта при олигофрении**:
Олигофрения — непрогредиентное состояние с врожденным или ранним общим психическим недоразвитием, преимущественно интеллектуальным.
Этиология: эндогенные (хромосомные) и экзогенные (органические, социальные).
Симптомы: низкий IQ, трудности обучения, проблемы памяти, внимания, абстрактного мышления, эмоциональная незрелость.
Степени по МКБ-10: лёгкая (F70), умеренная (F71), тяжёлая (F72), глубокая (F73).`,

      19: `**Особенности эмоционально-волевой сферы у детей с нарушениями интеллекта**:
- однообразие эмоций, неспособность подавлять аффекты;
- неустойчивость, изменчивость эмоций;
- неразвитость волевых качеств, внушаемость.
Педагогические выводы: важна осознанная оценка, формирование самооценки, учёт индивидуальных различий.`,

      20: `**Особенности познавательной сферы у детей с нарушениями интеллекта**:
Речь: бедность словаря, аграмматизмы.
Память: трудности воспроизведения, нестойкость.
Мышление: восприятие внешних сторон, неполноценный анализ, трудности сравнения, некритичность.
Внимание: малый объём, неустойчивость, утомляемость.
Восприятие: замедленность, фрагментарность.`,

      21: `**Структура дефекта у детей с ЗПР церебрально-органического генеза**:
Негрубая органическая недостаточность ЦНС резидуального характера.
В анамнезе: патологии беременности, недоношенность, асфиксия, нейроинфекции.
Неврологические стигмы, гидроцефалия, вегетативные нарушения.
ЭЭГ: незрелость коры.
Эмоционально-волевая незрелость — органический инфантилизм (неустойчивый или тормозимый тип).
Парциальность нарушений, мозаичность.`,

      22: `**Особенности познавательной сферы у детей с ЗПР**:
Память: снижение объёма, скорости, преобладание наглядной над словесной, снижение произвольной.
Внимание: низкая концентрация, неустойчивость, узкий объём.
Восприятие: недостаточная полнота, замедленность, низкий уровень аналитического восприятия.
Мышление: несформированность мотивации, низкая активность, стереотипность, трудности анализа, сравнения, классификации.`,

      23: `**Особенности эмоционально-волевой сферы у детей с ЗПР**:
Центральная характеристика — психический инфантилизм (преобладание игровой мотивации, неспособность к волевому усилию).
Эмоциональная лабильность, поверхностность эмоций, низкая толерантность к фрустрации.
Зависимость от типа ЗПР: неустойчивый (эйфория, расторможенность) и тормозимый (робость, боязливость).
Низкая самооценка, тревожность, слабость самоконтроля.`,

      24: `**Структура дефекта у слабовидящих детей**:
Слабовидение — стойкое снижение остроты зрения (0,05–0,4).
Первичный дефект: снижение остроты, сужение полей, нарушение цветоощущения.
Вторичные: сенсорно-перцептивные (затруднения в различении деталей), когнитивные (снижение скорости запоминания, фрагментарность), речевые (формализм речи), двигательные (неуверенность), личностные (тревожность, зависимость).`,

      25: `**Структура дефекта у слепых детей**:
Слепота — отсутствие зрения или остаточное зрение ≤0,04.
Первичный дефект: атрофия зрительного нерва, тяжёлые поражения сетчатки.
Вторичные: замена зрения на осязание и слух, замедленное формирование образов, выраженный формализм речи, серьёзные затруднения в ориентировке, скованность, риск аутизации.
Ведущие анализаторы: кожно-кинестетическая чувствительность + слух.`,

      26: `**Особенности эмоционально-волевой сферы у детей с нарушением зрения**:
Трудности самоконтроля, колебания настроения, преобладание аффективной логики, слабое усвоение негативного опыта.
Проблемы с пониманием жестов, преобладание отрицательных эмоций, затруднения в вербализации эмоций.
Замкнутость, зависимость от взрослых, сниженная самооценка, эгоцентризм, ригидность, иждивенческие установки.`,

      27: `**Особенности познавательной сферы у детей с нарушением зрения**:
Обеднение чувственного опыта — ключевая причина вторичных отклонений.
Восприятие: фрагментарность, доминирует зрительно-двигательно-слуховое.
Память: высокий объём слуховой, но быстрое забывание образов.
Мышление: трудности анализа, синтеза, сравнения.
Речь: формализм, бедность интонаций.
Внимание: быстрое утомление.
Задержки преодолимы при специальных условиях.`,

      28: `**Структура дефекта у слабослышащих детей**:
Первичный дефект — частичная слуховая недостаточность.
Вторичный — нарушения речевого развития (недостатки произношения, бедность лексики, аграмматизмы).
Третичный — особенности ВПФ: образная память лучше словесной, внимание непроизвольное, асинхрония восприятия, стереотипия мышления, трудности причинно-следственных связей.
Эмоционально-волевая сфера: трудности понимания эмоций, лабильность, тревожность.`,

      29: `**Структура дефекта у глухих детей**:
Первичный — тотальное выпадение слуха.
Вторичный — нарушение речевого развития (у ранооглохших — отсутствие речи, у позднооглохших — распад речи).
Третичный — особенности ВПФ: неустойчивое внимание, словесная память хуже образной, долго преобладает наглядно-образное мышление, обострение тактильно-вибрационной чувствительности.
Эмоционально-волевая сфера: бедность эмоций, слабость волевых усилий.`,

      32: `**Характеристика нарушений ОДА у детей**:
ДЦП — нервно-мышечная недостаточность вследствие поражения мозга.
Степени: тяжёлая (нет ходьбы), средняя (ходьба с приспособлениями), лёгкая (самостоятельная ходьба).
Этиология: пренатальные, перинатальные, постнатальные факторы.
Виды нарушений: мышечный тонус (спастичность, ригидность, гипотония, дистония), парезы/параличи, гиперкинезы, атаксия.
Формы ДЦП: спастическая диплегия, двойная гемиплегия, гемипаретическая, гиперкинетическая, атонически-астатическая.`,

      33: `**Структура дефекта при ДЦП**:
Первичный: органическое поражение (нарушение тонуса, парезы, гиперкинезы, координации).
Вторичный: нарушения восприятия, речи, пространственного гнозиса, интеллекта (от УО до нормы), зрительно-моторной координации, соматические нарушения.
Третичный: специфика личности (инфантилизм, пассивность, эгоцентризм), заниженная самооценка, дезадаптация, зависимость от окружения.`,

      38: `**Структура дефекта при моторной алалии**:
Моторная алалия — системное недоразвитие экспрессивной речи при относительной сохранности смысловых и сенсомоторных операций.
Первичное звено: несформированность произвольной речевой деятельности.
Вторичное: нарушение коммуникативной функции, речевой негативизм.
Нарушается лексико-грамматический строй, операции программирования, выбора и комбинирования.
Неречевые проявления: моторная неловкость, апраксия, утомляемость, снижение внимания и памяти, речевой негативизм.`,

      39: `**Структура дефекта при сенсорной алалии**:
Сенсорная алалия — нарушение понимания речи при полноценном физическом слухе, вследствие поражения височной доли.
Первичный дефект: нарушение импрессивной стороны речи (не формируется связь звук–предмет).
Вторичные: акустическая агнозия, вторичное недоразвитие экспрессивной речи, речевой негативизм.
Неречевая симптоматика: использование жестов, нарушения слухового внимания, трудности пространственной ориентировки, мнестические нарушения.`,

      40: `**Структура дефекта при дизартрии**:
Дизартрия — нарушение произносительной стороны речи из-за недостаточной иннервации речевого аппарата.
Первичный дефект: расстройство произношения.
Вторичные: недоразвитие лексико-грамматического строя, трудности связного высказывания, нарушения чтения и письма.
Особенности ВПФ: неустойчивость внимания, снижение памяти, замедленное мышление, нарушения фонематического восприятия.
Эмоционально-волевая сфера: раздражительность, лабильность, неуверенность.`,

      41: `**Особенности познавательной сферы у детей с нарушениями речи**:
Восприятие: отсутствие фонематического слуха, отставание зрительного восприятия, задержка пространственных представлений.
Внимание: неустойчивое, низкая произвольность.
Память: трудности узнавания сложных образов, словесная память хуже нормы.
Мышление: недостатки знаний, неподвижность операций, трудности причинно-следственных связей.
Речь: снижение речевой интенции, негативизм, замкнутость.`,

      42: `**Особенности эмоционально-волевой сферы у детей с нарушениями речи**:
- слабость саморегуляции, самоконтроля;
- пассивность, зависимость, сензитивность;
- преобладание эксцентричности или концентричности;
- низкая работоспособность;
- неадекватная самооценка (завышенная или заниженная);
- фиксация на дефекте (нулевая, умеренная, выраженная).
При ринолалии — застенчивость, замкнутость. При дизартрии — возбудимость или заторможенность.`,

      43: `**Изучение внимания у детей с ОВЗ**:
Цель: определить, какие свойства внимания нарушены (объём, устойчивость, концентрация, переключение, распределение, произвольность).
Задачи: оценить уровень, выявить условия ухудшения, отличить первичные от вторичных нарушений.
Принципы: комплексность, учёт причины, доступность, динамичность, этичность.
Методики: корректурная проба, таблицы Шульте, Пьерон-Рузер, "найди отличия", опросники.
Особенности при разных ОВЗ: ЗПР, УО, ТНР, нарушения слуха, зрения, ОДА, РАС, СДВГ.
Рекомендации: дробление инструкции, визуальные опоры, чередование деятельности, обучение самопроверке.`,

      44: `**Изучение восприятия у детей с ОВЗ**:
Восприятие — целостный образ предмета.
Изучают: зрительное, слуховое, пространственное, тактильное восприятие, схему тела, темп и точность.
Методы: наблюдение, беседа, предметные и картинные задания, зрительный анализ, пространственная ориентировка, слуховые и тактильные пробы.
Особенности при ЗПР, УО, РАС, нарушениях зрения, слуха, речи, ОДА.
Интерпретация: учитывать влияние утомления, тревоги, речи, моторики.
Рекомендации: наглядность, короткие инструкции, многоканальная опора.`,

      45: `**Изучение памяти у детей с ОВЗ**:
Память — фиксация, сохранение, воспроизведение.
Типы нарушений: модально-неспецифические (энергетический блок) и модально-специфические (анализаторные зоны).
Количественные: гипомнезия, гипермнезия, амнезии.
Качественные: конфабуляции, криптомнезии, псевдореминисценции.
При УО — страдает логическая память, при ЗПР — неравномерность, при ДЦП — истощаемость, при сенсорных нарушениях — компенсаторный характер.
Методики: пиктограмма, узнавание фигур, ассоциативная память.`,

      46: `**Особенности мышления у детей с ОВЗ**:
Мышление — отражение связей. Виды: наглядно-действенное, конкретно-образное, абстрактно-логическое.
Основные нарушения (Зейгарник): операциональной стороны, динамики, личностно-мотивационного компонента.
При нарушениях слуха: страдает словесно-логическое мышление.
При нарушениях зрения: сужены понятия, вязкость.
При ТНР: трудности словесно-логического.
При УО: лабильность, инертность, снижение обобщения.
При ЗПР: заторможенность, низкий анализ.
При ДЦП: инертность, проблемы пространственного мышления.
Методики: "исключение лишнего", "логика связей".`,

      47: `**Изучение эмоционально-волевой сферы у детей с ОВЗ**:
Общие закономерности дизонтогенеза ЭВС: позднее становление высших эмоций, склонность к аффективным вспышкам, трудности регуляции.
Специфика: при ЗПР — поверхностность, внушаемость; при УО — некритичность, примитивные влечения; при ДЦП — тревожность, страхи; при нарушениях слуха/зрения — обеднённость мимики, обидчивость.
Методы: проективные (рисунок человека, тест Розенцвейга), шкалы (Люшер, "Паровозик"), беседа.`,

      48: `**Структура дефекта у детей с РАС**:
Первичный дефект: биологический (зеркальные нейроны, миндалина) → снижение потребности в контакте, слабость теории психического.
Вторичные: сверхценные страхи, агрессия, эхолалии, мутизм, неравномерность интеллекта, стереотипии.
Третичные: социальная изоляция, дезадаптация.
Пример: ребёнок не идёт на контакт → аутоагрессия → родители перестают выходить. Ранняя коррекция снижает вторичные наслоения.`,

      49: `**Эмоциональный интеллект и регуляция поведения**:
Компоненты ЭИ и нарушения при РАС:
- идентификация эмоций: сложности распознавания;
- понимание эмоций: трудности причинно-следственных связей;
- саморегуляция: истерики, агрессия, аутоагрессия;
- использование эмоций: слабая способность к сопереживанию.
Связь с когнитивной сферой: дезорганизация аффективной системы → искажение обработки опыта. Теория сенсорной интеграции.
Специфика волевых нарушений в группах аутистического дизонтогенеза (I–IV группы).`,

      50: `**Особенности познавательной сферы у детей с РАС**:
Неравномерный, диссоциированный характер. Невербальный интеллект часто выше вербального.
- Неустойчивость внимания, психическая пресыщаемость.
- Сенсорная ранимость, фрагментарность восприятия.
- Механическая память без осмысления.
- Трудности символизации, переноса навыков.
- Визуальный характер мышления.
- Стереотипность, моторная неловкость.
- Проблемы речи и коммуникации.`,

      52: `**Понятие и виды девиантного поведения у детей и подростков**:
Девиантное поведение — отклонение от принятых норм.
Социальная норма — групповое представление о требованиях к поведению.
Виды:
- аморальное (нарушение морально-этических норм);
- делинквентное (противоправное: кражи, хулиганство);
- саморазрушительное (суицидальное, аддиктивное — химические и нехимические зависимости, аутичное поведение).
Группа может порождать аутодеструкцию: самопорезы, аддикции.`
    };

    // ---------------------------------------------------------------------
    // 2. STATE
    // ---------------------------------------------------------------------
    let completed = new Set();          // номера билетов (числа)
    let currentTicket = null;          // объект { num, title, topicLabel }

    // ---------------------------------------------------------------------
    // 3. RENDER SIDEBAR
    // ---------------------------------------------------------------------
    function renderSidebar() {
      const container = document.getElementById('topicList');
      container.innerHTML = '';

      topics.forEach(topic => {
        const group = document.createElement('div');
        group.className = 'topic-group';

        const label = document.createElement('div');
        label.className = 'topic-label';
        label.textContent = topic.label;
        group.appendChild(label);

        topic.tickets.forEach(t => {
          const item = document.createElement('div');
          item.className = 'ticket-item';
          if (completed.has(t.num)) item.classList.add('completed');

          const numSpan = document.createElement('span');
          numSpan.className = 'num';
          numSpan.textContent = t.num;
          item.appendChild(numSpan);

          const titleSpan = document.createElement('span');
          titleSpan.className = 'title';
          titleSpan.textContent = t.title;
          item.appendChild(titleSpan);

          const check = document.createElement('span');
          check.className = 'check-mark';
          check.textContent = completed.has(t.num) ? '✓' : '○';
          item.appendChild(check);

          item.dataset.num = t.num;
          item.dataset.title = t.title;
          item.dataset.topicLabel = topic.label;

          item.addEventListener('click', function(e) {
            const num = parseInt(this.dataset.num);
            const title = this.dataset.title;
            const topicLabel = this.dataset.topicLabel;
            showTicket(num, title, topicLabel);
          });

          group.appendChild(item);
        });

        container.appendChild(group);
      });

      updateProgress();
    }

    // ---------------------------------------------------------------------
    // 4. SHOW TICKET
    // ---------------------------------------------------------------------
    function showTicket(num, title, topicLabel) {
      const display = document.getElementById('ticketDisplay');
      const breadcrumbTopic = document.getElementById('currentTopicLabel');
      breadcrumbTopic.textContent = topicLabel || 'Билет';

      const text = ticketTexts[num] || '*текст билета не найден*';

      // форматируем текст: простые \n в <br>, но сохраняем структуру
      // преобразуем markdown-подобные **жирный** и *курсив*
      let htmlContent = text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/\n/g, '<br>');

      // Добавляем базовую структуру для читаемости (заголовки, списки)
      // простая эвристика: если строка начинается с цифры и точки -> оборачиваем в маркированный список
      // но мы не будем усложнять, оставим как есть с <br>
      // Но для удобства обернём в параграфы.
      htmlContent = htmlContent.replace(/(<br>){2,}/g, '</p><p>');
      htmlContent = '<p>' + htmlContent + '</p>';

      // дополнительная обработка: если есть маркированные списки (цифры, дефисы)
      // превратим "1. " в <li> и т.п. (упрощённо)
      // сделаем только базовое форматирование, чтобы не перегружать

      const isLearned = completed.has(num);

      display.innerHTML = `
        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
          <div>
            <h2>Билет ${num}. ${title}</h2>
            <div class="subhead">${topicLabel || ''}</div>
          </div>
        </div>
        <div class="ticket-content">${htmlContent}</div>
        <div class="action-bar">
          <button class="btn-learn ${isLearned ? 'learned' : ''}" id="learnBtn">
            ${isLearned ? '✅ Изучено' : '📘 Отметить как изученное'}
          </button>
          <span class="status-badge">${isLearned ? '✔️ выучено' : '⏳ не изучено'}</span>
        </div>
      `;

      // сохраняем текущий билет
      currentTicket = { num, title, topicLabel };

      // обработчик кнопки "выучила"
      const btn = document.getElementById('learnBtn');
      if (btn) {
        btn.addEventListener('click', function() {
          toggleCompleted(num);
        });
      }

      // подсветка активного элемента в меню
      document.querySelectorAll('.ticket-item').forEach(el => {
        el.classList.toggle('active', parseInt(el.dataset.num) === num);
      });
    }

    // ---------------------------------------------------------------------
    // 5. TOGGLE COMPLETED
    // ---------------------------------------------------------------------
    function toggleCompleted(num) {
      if (completed.has(num)) {
        completed.delete(num);
      } else {
        completed.add(num);
      }
      // перерисовываем меню (обновляем чекбоксы и классы)
      renderSidebar();
      // обновляем отображение текущего билета, если он открыт
      if (currentTicket && currentTicket.num === num) {
        // перерисовываем текущий билет с обновлённым статусом
        showTicket(currentTicket.num, currentTicket.title, currentTicket.topicLabel);
      } else {
        // если текущий билет не совпадает, но мы всё равно обновим меню
        // также обновим прогресс
        updateProgress();
      }
      // если билет не открыт, просто обновляем прогресс
      if (!currentTicket || currentTicket.num !== num) {
        // но если мы переключили через меню, текущий билет уже есть
        // однако здесь мы вызываем только из кнопки, когда билет открыт
      }
    }

    // ---------------------------------------------------------------------
    // 6. UPDATE PROGRESS
    // ---------------------------------------------------------------------
    function updateProgress() {
      const total = 52;
      const done = completed.size;
      document.getElementById('progressText').textContent = `${done} / ${total} изучено`;
    }

    // ---------------------------------------------------------------------
    // 7. INIT
    // ---------------------------------------------------------------------
    renderSidebar();

    // если есть сохранённое состояние в localStorage (опционально)
    // для удобства пользователя
    try {
      const saved = localStorage.getItem('ticket_completed');
      if (saved) {
        const arr = JSON.parse(saved);
        arr.forEach(n => completed.add(n));
        renderSidebar();
        updateProgress();
      }
    } catch(e) {}

    // сохраняем при любом изменении
    const origToggle = toggleCompleted;
    toggleCompleted = function(num) {
      origToggle(num);
      try {
        localStorage.setItem('ticket_completed', JSON.stringify([...completed]));
      } catch(e) {}
    };

    // переопределяем renderSidebar, чтобы использовать новый toggleCompleted
    // но мы уже переопределили функцию выше, сохраним ссылку
    // дополнительно: при клике на билет показываем его
    // по умолчанию покажем первый билет для приветствия
    if (topics.length && topics[0].tickets.length) {
      const first = topics[0].tickets[0];
      showTicket(first.num, first.title, topics[0].label);
    }

  })();
</script>
